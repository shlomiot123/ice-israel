services:
  - type: web
    name: ice-israel
    runtime: static
    # התיקייה שמוגשת כאתר - כל הקבצים כבר בשורש הפרויקט
    staticPublishPath: .
    # URL rewriting (SPA-like, אבל כאן רק כדי להגן מפני 404 על קבצים חסרים)
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Pretty URL without .html — /blog → /blog.html
      - type: rewrite
        source: /blog
        destination: /blog.html
      - type: rewrite
        source: /posts/:slug
        destination: /posts/:slug.html
